services:
  async-agents:
    build: .
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - DB_PATH=/app/db/agents.sqlite
      - DATA_PATH=/app/data
    volumes:
      - agents-db:/app/db
      - agents-data:/app/data
      - opencode-data:/root/.local/share/opencode
      - opencode-config:/root/.config/opencode

volumes:
  agents-db:
  agents-data:
  opencode-data:
  opencode-config:
